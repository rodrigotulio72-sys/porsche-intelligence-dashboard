function fill(id,key){
 let s=document.getElementById(id);
 s.innerHTML='<option>Todos</option>';
 [...new Set(data.map(x=>x[key]))].sort().forEach(v=>s.innerHTML+=`<option>${v}</option>`);
 s.onchange=render;
}

fill('model','PorscheModelSanitized');
fill('city','CitySanitized');
fill('pay','PayMethodSanitized');
fill('quarter','Quarter');

function render(){
 let d=[...data];
 if(model.value!='Todos') d=d.filter(x=>x['PorscheModelSanitized']==model.value);
 if(city.value!='Todos') d=d.filter(x=>x['CitySanitized']==city.value);
 if(pay.value!='Todos') d=d.filter(x=>x['PayMethodSanitized']==pay.value);
 if(quarter.value!='Todos') d=d.filter(x=>x['Quarter']==quarter.value);

 const mc={},cc={},pc={},qc={};
 d.forEach(r=>{
   mc[r['PorscheModelSanitized']] = (mc[r['PorscheModelSanitized']]||0)+1;
   cc[r['CitySanitized']] = (cc[r['CitySanitized']]||0)+1;

 });

 Plotly.newPlot('citychart',[{x:Object.keys(cc),y:Object.values(cc),type:'bar'}],
